# Nginx configuration for dev1.superaffiliate.app
# This file should be deployed to the dev server at:
# /etc/nginx/sites-available/dev1.superaffiliate.app

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name dev1.superaffiliate.app;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server - reverse proxy to Strapi
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev1.superaffiliate.app;
    
    # SSL certificates (will be configured by certbot)
    # ssl_certificate /etc/letsencrypt/live/dev1.superaffiliate.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dev1.superaffiliate.app/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Logging
    access_log /var/log/nginx/dev1.superaffiliate.app.access.log;
    error_log /var/log/nginx/dev1.superaffiliate.app.error.log;
    
    # Increase upload size for images (250MB)
    client_max_body_size 250M;
    
    # Proxy to Strapi backend running on localhost:1337
    location / {
        proxy_pass http://localhost:1337;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Disable buffering for better streaming
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
