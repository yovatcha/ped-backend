version: '3.8'

services:
  strapi:
    build: .
    ports:
      - "1337:1337"
    volumes:
      # Persist uploads directory - images won't be lost on restart
      - ./public/uploads:/app/public/uploads
      # Persist database - SQLite data won't be lost on restart
      - ./.tmp:/app/.tmp
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=1337
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:1337/_health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
